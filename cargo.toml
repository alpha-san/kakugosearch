[package]
name = "kakugosearch"
version = "0.1.0"
edition = "2021"
description = "A lightweight search engine with pluggable AI reranking"
license = "MIT"

[dependencies]
# HTTP framework
axum = { version = "0.7", features = ["json", "macros"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Full-text search
tantivy = "0.22"

# Vector / ANN search
usearch = "2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# HTTP client (for AI providers)
reqwest = { version = "0.12", features = ["json"] }

# Config
toml = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async traits
async-trait = "0.1"

# Utilities
uuid = { version = "1", features = ["v4"] }
thiserror = "1"
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
dashmap = "5"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
criterion = { version = "0.5", features = ["html_reports"] }
hdrhistogram = "7"

[[bench]]
name = "search"
harness = false
